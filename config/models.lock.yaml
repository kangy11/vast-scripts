# Public and private model mappings discovered from the live Vast instance.
# The private repo `wykang/comfyui-private-models` stores files under ComfyUI-relative paths.
# We sync that private repo into `COMFYUI_ROOT` as a whole so new private files do not
# require updates to this lock file.

- name: anima-preview3-base
  repo_id: circlestone-labs/Anima
  revision: main
  target_dir: models/diffusion_models
  include:
    - "split_files/diffusion_models/anima-preview3-base.safetensors"
  exclude: []
  private: false

- name: anima-qwen-text-encoder
  repo_id: circlestone-labs/Anima
  revision: main
  target_dir: models/clip
  include:
    - "split_files/text_encoders/qwen_3_06b_base.safetensors"
  exclude: []
  private: false

- name: qwen-image-vae
  repo_id: Comfy-Org/Qwen-Image_ComfyUI
  revision: main
  target_dir: models/vae
  include:
    - "split_files/vae/qwen_image_vae.safetensors"
  exclude: []
  private: false

- name: flan-t5-xxl-q8-gguf
  repo_id: silveroxides/flan-t5-xxl-encoder-only-GGUF
  revision: main
  target_dir: models/clip
  include:
    - "flan-t5-xxl-Q8_0.gguf"
  exclude: []
  private: false

- name: z-image-ae
  repo_id: morikomorizz/Z-Image-AIO
  revision: main
  target_dir: models/vae
  include:
    - "ae.safetensors"
  exclude: []
  private: false

- name: comfyui-private-models
  repo_id: wykang/comfyui-private-models
  revision: main
  target_dir: .
  private: true
